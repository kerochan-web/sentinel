servicenow:
  instance_url: "https://dev-mock.service-now.com"
  username: "sentinel_svc"
  password: "securepassword123"

remediation_defaults:
  max_retries: 3
  cooldown_period: 5m
  circuit_breaker_threshold: 5

services:
  - name: "nginx-frontend"
    type: "systemd"
    target: "nginx"
    check_interval: 30s
    maintenance: true
    maintenance_until: "2026-07-16T14:00:00Z"
  
  - name: "inventory-api"
    type: "http"
    target: "http://localhost:6969/health"
    check_interval: 15s
    maintenance: false
